{% extends "layout_admin.html" %}
{% block title %}{{ 'Edit' if supplier else 'Add' }} Supplier{% endblock %}
{% block page_title %}{{ 'Edit' if supplier else 'Add' }} Supplier{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Supplier Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ supplier.name if supplier else '' }}" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ supplier.phone if supplier else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ supplier.email if supplier else '' }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2">{{ supplier.address if supplier else '' }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" value="{{ supplier.city if supplier else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">State</label>
                        <input type="text" name="state" class="form-control" value="{{ supplier.state if supplier else '' }}">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-gold"><i class="bi bi-check-lg"></i> {{ 'Update' if supplier else 'Add' }}</button>
                    <a href="{{ url_for('suppliers.supplier_list') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
