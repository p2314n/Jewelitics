{% extends "layout_admin.html" %}
{% block title %}{{ 'Edit' if category else 'Add' }} Category{% endblock %}
{% block page_title %}{{ 'Edit' if category else 'Add' }} Category{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Category Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{ category.description if category else '' }}</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-gold"><i class="bi bi-check-lg"></i> {{ 'Update' if category else 'Add' }} Category</button>
                    <a href="{{ url_for('products.categories') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
