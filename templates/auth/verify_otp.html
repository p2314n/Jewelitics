{% extends "layout_auth.html" %}
{% block title %}Verify Email{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div class="brand mb-2">
            <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
            <h2 class="mt-3">Verify Your Email</h2>
            <p class="text-muted">We sent a 6-digit verification code to <br><strong class="text-white">{{ user.email }}</strong></p>
        </div>

        <form method="POST" class="mt-4">
            <div class="mb-4">
                <label class="form-label d-block text-start">Enter Verification Code</label>
                <input type="text" name="otp" class="form-control text-center py-3" placeholder="••••••" maxlength="6" style="font-size: 2rem; letter-spacing: 15px; font-weight: 700;" required autofocus autocomplete="off">
            </div>
            
            <button type="submit" class="btn btn-gold w-100 py-2 mb-3" style="font-size: 1.1rem;">
                Verify Email <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="mt-4">
            <p class="text-muted" style="font-size: 0.9rem;">
                Didn't receive the code? <br>
                <a href="{{ url_for('auth.resend_otp', user_id=user.id) }}" class="text-warning text-decoration-none">Click here to resend</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
