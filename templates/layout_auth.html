{% extends "base.html" %}

{% block body %}
<main>
    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}<div class="container mt-3">
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show">{{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}</div>{% endif %}{% endwith %}
    {% block content %}{% endblock %}
    
    <!-- Floating Theme Toggle for Auth Pages -->
    <button class="btn btn-social" onclick="toggleTheme()" title="Toggle Theme" style="position: absolute; top: 20px; right: 20px; z-index: 100; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: var(--glass-bg); backdrop-filter: blur(10px);">
        <i id="themeIcon" class="bi bi-moon-stars-fill"></i>
    </button>
    
    <script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
    </script>
</main>
{% endblock %}
